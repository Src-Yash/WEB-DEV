<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Marks Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1> Student Marks & Grade Calculator </h1>

    <div class="input-section">
        <label>Enter Number of Subjects</label>
        <input type="number" id="subjects" min="1" placeholder="Example: 5">
        <button onclick="createInputs()">Create Subject Inputs</button>
    </div>

    <form id="marksForm">
        <div id="marksInputs"></div>
        <button type="button" id="calculateBtn" onclick="calculateResult()" style="display:none;">
            Calculate Result
        </button>
    </form>
    <div id="result" class="result"></div>
</div>
<script src="script.js"></script>
</body>
</html>
